<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>救急シミュレーション管理システム</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --surface-2: #f1f5f9;
  --surface-3: #e2e8f0;
  --dark:      #0f172a;
  --dark-2:    #1e293b;
  --dark-3:    #334155;
  --dark-4:    #475569;
  --muted:     #94a3b8;
  --text:      #0f172a;
  --text-2:    #334155;
  --text-3:    #64748b;
  --border:    #e2e8f0;
  --border-2:  #cbd5e1;
  --blue:      #2563eb;
  --blue-bg:   #eff6ff;
  --blue-bd:   #bfdbfe;
  --green:     #059669;
  --green-bg:  #ecfdf5;
  --green-bd:  #a7f3d0;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --red-bd:    #fecaca;
  --amber:     #d97706;
  --amber-bg:  #fffbeb;
  --amber-bd:  #fde68a;
  --indigo:    #4f46e5;
  --indigo-bg: #eef2ff;
  --indigo-bd: #c7d2fe;
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  18px;
  --r-xl:  24px;
  --r-2xl: 32px;
  --shadow:    0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.12);
}
* { -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  height: 100dvh;
  overflow: hidden;
}
input, textarea, select, button { font-family: inherit; }
input, textarea, select { font-size: 16px !important; }
button { cursor: pointer; }

/* ===================== LAYOUT ===================== */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  padding-top: env(safe-area-inset-top);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* ===================== HEADER ===================== */
.header {
  background: var(--dark);
  color: white;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--dark-3);
  z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
.header-logo {
  background: var(--blue);
  padding: 8px;
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.header-title-wrap { min-width: 0; flex: 1; }
#header-title {
  font-size: 14px;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}
@media(min-width:480px){ #header-title { max-width: 260px; font-size: 15px; } }
@media(min-width:768px){ #header-title { max-width: 400px; font-size: 16px; } }
.header-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.hbtn {
  background: none;
  border: none;
  padding: 8px;
  border-radius: 50%;
  color: var(--muted);
  display: flex;
  align-items: center;
  transition: background .15s, color .15s;
}
.hbtn:hover { background: var(--dark-2); color: white; }
.hbtn:active { transform: scale(.9); }
.hbtn-save {
  background: var(--blue);
  border: none;
  padding: 8px;
  border-radius: 50%;
  color: white;
  display: flex;
  align-items: center;
}
.hbtn-save:active { transform: scale(.9); }
.hbtn-io {
  background: var(--dark-3);
  border: none;
  padding: 8px;
  border-radius: 50%;
  color: white;
  display: flex;
  align-items: center;
}
.btn-edit {
  background: var(--dark-3);
  border: none;
  padding: 7px 13px;
  border-radius: 99px;
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background .15s;
}
.btn-edit:hover { background: var(--dark-4); }
.btn-edit.active { background: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.25); }

/* ===================== SYNC STATUS ===================== */
.sync-bar {
  background: var(--dark-2);
  padding: 4px 14px;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--dark-3);
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.sync-dot.ok { background: #22c55e; }
.sync-dot.err { background: var(--red); }
.sync-dot.pulse { animation: pulse 1.5s infinite; background: #fbbf24; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ===================== PHASE NAV ===================== */
.phase-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}
.phase-nav::-webkit-scrollbar { display: none; }
.phase-btn {
  background: var(--surface-2);
  border: none;
  padding: 8px 16px;
  border-radius: var(--r-md);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  white-space: nowrap;
  transition: all .15s;
  flex-shrink: 0;
}
.phase-btn:hover { background: var(--surface-3); color: var(--text-2); }
.phase-btn.sel-dark { background: var(--dark); color: white; box-shadow: var(--shadow); }
.phase-btn.sel-blue { background: var(--blue); color: white; box-shadow: var(--shadow); }
.phase-btn-del {
  background: none; border: none;
  color: var(--red);
  font-size: 16px;
  padding: 0 4px;
  line-height: 1;
  display: flex; align-items: center;
}
.phase-add-btn {
  background: none;
  border: 1px dashed var(--blue-bd);
  color: var(--blue);
  padding: 8px 12px;
  border-radius: var(--r-md);
  font-size: 18px;
  display: flex; align-items: center;
  transition: background .15s;
  flex-shrink: 0;
}
.phase-add-btn:hover { background: var(--blue-bg); }

/* ===================== MAIN ===================== */
main { flex: 1; display: flex; overflow: hidden; }
.section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.section.hidden { display: none; }
@media(min-width:1024px) { .section.hidden { display: flex; } }
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 16px;
  padding-bottom: 110px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ===================== CARDS ===================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;
}
.card-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.card-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card-text { font-size: 13px; font-weight: 500; line-height: 1.75; color: var(--text-2); white-space: pre-wrap; }
.card-bold { font-size: 13px; font-weight: 700; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
.card-h { font-size: 20px; font-weight: 900; color: var(--text); }

/* Edit inputs inside cards */
.edit-input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--r-sm);
  padding: 8px 10px;
  color: var(--text);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.edit-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
textarea.edit-input { resize: vertical; min-height: 80px; line-height: 1.6; }

/* ===================== INFO CARDS ===================== */
.goal-card { background: var(--green-bg); border: 1px solid var(--green-bd); border-radius: var(--r-lg); padding: 16px; }
.goal-card .card-label { color: var(--green); }
.point-card { background: var(--indigo-bg); border: 1px solid var(--indigo-bd); border-radius: var(--r-xl); padding: 18px; position: relative; overflow: hidden; }
.point-card .card-label { color: var(--indigo); }
.dispatch-card { background: var(--blue-bg); border: 1px solid var(--blue-bd); border-radius: var(--r-lg); padding: 16px; }
.dispatch-card .card-label { color: var(--blue); }
.callback-card { background: var(--green-bg); border: 1px solid var(--green-bd); border-radius: var(--r-lg); padding: 16px; }
.callback-card .card-label { color: var(--green); }

/* ===================== EMERGENCY ===================== */
.emergency-card {
  background: var(--red);
  color: white;
  padding: 18px;
  border-radius: var(--r-lg);
  box-shadow: 0 4px 20px rgba(220,38,38,.3);
  border-bottom: 3px solid #991b1b;
}
.emergency-card .e-label { font-size: 10px; font-weight: 700; opacity: .8; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.emergency-card .e-value { font-size: 22px; font-weight: 900; font-style: italic; }

/* ===================== ABCDE ===================== */
.abcde-panel {
  background: #0f172a;
  border: 1px solid var(--dark-3);
  border-radius: var(--r-xl);
  padding: 20px;
  color: #e2e8f0;
}
.abcde-title {
  color: #60a5fa;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  border-bottom: 1px solid var(--dark-3);
  padding-bottom: 10px;
  margin-bottom: 16px;
}
.abcde-row { display: flex; gap: 14px; margin-bottom: 14px; }
.abcde-row:last-child { margin-bottom: 0; }
.abcde-letter { font-size: 22px; font-weight: 900; width: 22px; flex-shrink: 0; font-family: ui-monospace, monospace; }
.abcde-letter.a { color: #60a5fa; }
.abcde-letter.b { color: #34d399; }
.abcde-letter.c { color: #f87171; }
.abcde-letter.d { color: #fbbf24; }
.abcde-letter.e { color: #67e8f9; }
.abcde-text { font-size: 13px; font-weight: 700; line-height: 1.65; font-family: ui-monospace, monospace; white-space: pre-wrap; }
textarea.abcde-edit {
  width: 100%;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: var(--r-sm);
  color: #e2e8f0;
  padding: 10px;
  font-size: 13px;
  font-family: ui-monospace, monospace;
  line-height: 1.6;
  resize: vertical;
  min-height: 70px;
  outline: none;
}
textarea.abcde-edit:focus { border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(96,165,250,.2); }

/* ===================== HISTORY / SECONDARY ===================== */
.hist-card { border: 1px solid var(--border); border-left: 3px solid var(--amber); border-radius: 0 var(--r-lg) var(--r-lg) 0; background: var(--surface); padding: 16px 16px 16px 18px; }
.hist-card .card-label { color: var(--amber); }
.sec-card { border: 1px solid var(--border); border-left: 3px solid var(--indigo); border-radius: 0 var(--r-lg) var(--r-lg) 0; background: var(--surface); padding: 16px 16px 16px 18px; }
.sec-card .card-label { color: var(--indigo); }

/* ===================== VITALS ===================== */
.vitals-card { background: var(--surface); border: 2px solid var(--green-bd); border-radius: var(--r-xl); padding: 18px; position: relative; overflow: hidden; }
.vitals-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--green); }
.vitals-card .card-label { color: var(--green); padding-left: 6px; }
.vitals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media(min-width:480px) { .vitals-grid { grid-template-columns: repeat(3, 1fr); } }
.vital-item { background: var(--surface-2); padding: 10px; border-radius: var(--r-sm); }
.vital-label { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.vital-val { font-size: 18px; font-weight: 900; color: var(--text); line-height: 1; display: inline; }
.vital-unit { font-size: 9px; color: var(--muted); font-weight: 700; margin-left: 2px; }

/* ===================== FINDINGS ===================== */
.findings-card { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--r-lg); padding: 16px; }
.findings-card .card-label { color: var(--text-3); }

/* ===================== EVAL SECTION ===================== */
.eval-header {
  background: var(--dark);
  color: white;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  border-left: 1px solid var(--dark-3);
}
.eval-header h2 { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.reset-btn {
  background: none;
  border: none;
  padding: 7px;
  border-radius: var(--r-sm);
  color: var(--muted);
  transition: all .15s;
  display: flex; align-items: center;
}
.reset-btn:hover { background: var(--dark-2); color: white; }
.add-eval-btn {
  background: var(--blue);
  border: none;
  padding: 7px;
  border-radius: var(--r-sm);
  color: white;
  display: flex; align-items: center;
}
.eval-item { padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.eval-item:last-of-type { border-bottom: none; }
.eval-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.eval-task { font-size: 13px; font-weight: 800; line-height: 1.55; color: var(--text); flex: 1; padding-top: 4px; }
.eval-btns {
  display: flex;
  gap: 5px;
  background: var(--surface-2);
  padding: 5px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.eval-btn {
  background: none;
  border: none;
  padding: 9px;
  border-radius: var(--r-sm);
  color: var(--muted);
  transition: all .2s;
  display: flex; align-items: center;
}
.eval-btn:active { transform: scale(.88); }
.eval-btn.ok { background: var(--green); color: white; transform: scale(1.08); box-shadow: 0 2px 8px rgba(5,150,105,.3); }
.eval-btn.ng { background: var(--red); color: white; transform: scale(1.08); box-shadow: 0 2px 8px rgba(220,38,38,.3); }
.eval-feedback {
  margin-top: 12px;
  background: var(--red-bg);
  border-left: 3px solid var(--red);
  padding: 14px;
  border-radius: 0 var(--r-md) var(--r-md) 0;
  animation: riseUp .25s ease;
}
.eval-feedback-lbl { font-size: 10px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.eval-feedback-txt { font-size: 12px; font-weight: 700; color: #7f1d1d; line-height: 1.7; white-space: pre-wrap; }
.eval-edit-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px; position: relative; animation: riseUp .25s ease; }
.eval-edit-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); transition: color .15s; padding: 4px; }
.eval-edit-del:hover { color: var(--red); }

/* ===================== TAKE-HOME MESSAGE ===================== */
.thm-card {
  background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
  color: white;
  padding: 24px;
  border-radius: var(--r-2xl);
  box-shadow: 0 8px 32px rgba(79,70,229,.3);
}
.thm-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; opacity: .7; margin-bottom: 12px; }
.thm-text { font-size: 14px; font-weight: 800; line-height: 1.8; font-style: italic; }

/* ===================== DIVIDER ===================== */
.divider { border: none; border-top: 3px double var(--border); margin: 8px 0; }

/* ===================== FOOTER NAV ===================== */
.footer-nav {
  display: flex;
  justify-content: space-around;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  flex-shrink: 0;
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
  z-index: 60;
}
@media(min-width:1024px) { .footer-nav { display: none; } }
.nav-btn {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 18px;
  border-radius: var(--r-lg);
  gap: 3px;
  color: var(--muted);
  transition: all .2s;
  min-width: 76px;
}
.nav-btn.active { background: var(--blue-bg); color: var(--blue); }
.nav-btn span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }

/* ===================== MODALS ===================== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.65);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.overlay.hidden { display: none; }
.modal {
  background: var(--surface);
  width: 100%;
  max-width: 540px;
  border-radius: var(--r-2xl);
  overflow: hidden;
  animation: riseUp .3s cubic-bezier(.16,1,.3,1);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  background: var(--dark);
  color: white;
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.modal-header h3 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  padding: 6px;
  border-radius: 50%;
  display: flex; align-items: center;
  transition: all .15s;
}
.modal-close:hover { background: var(--dark-2); color: white; }
.modal-body { padding: 20px; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--surface); flex-shrink: 0; padding-bottom: calc(14px + env(safe-area-inset-bottom)); }

/* scenario list item */
.s-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: all .15s;
  gap: 8px;
  margin-bottom: 10px;
}
.s-item:hover { border-color: var(--blue); box-shadow: var(--shadow); }
.s-item:active { background: var(--blue-bg); }
.s-item-del { background: none; border: none; color: var(--muted); padding: 6px; border-radius: var(--r-sm); transition: color .15s; flex-shrink: 0; display: flex; align-items: center; }
.s-item-del:hover { color: var(--red); }

/* IO modal */
.io-textarea {
  width: 100%;
  background: #0f172a;
  color: #4ade80;
  font-family: ui-monospace, monospace;
  font-size: 12px !important;
  border: 1px solid var(--dark-3);
  border-radius: var(--r-lg);
  padding: 14px;
  height: 220px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
.io-copy-btn {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,.1);
  border: none;
  color: white;
  padding: 6px;
  border-radius: var(--r-sm);
  display: flex; align-items: center;
  transition: background .15s;
}
.io-copy-btn:hover { background: rgba(255,255,255,.2); }

/* ===================== BUTTONS ===================== */
.btn-primary {
  background: var(--blue);
  color: white;
  border: none;
  padding: 11px 22px;
  border-radius: var(--r-lg);
  font-weight: 700;
  font-size: 13px;
  display: flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:active { transform: scale(.96); }
.btn-ghost {
  background: none;
  color: var(--text-3);
  border: none;
  padding: 11px 18px;
  border-radius: var(--r-lg);
  font-weight: 700;
  font-size: 13px;
  transition: background .15s;
}
.btn-ghost:hover { background: var(--surface-2); }

/* ===================== TOAST ===================== */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--dark);
  color: white;
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  z-index: 200;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ===================== ADD EVAL BTN ===================== */
.add-eval-row {
  width: 100%;
  padding: 18px;
  border: 2px dashed var(--border-2);
  border-radius: var(--r-xl);
  color: var(--text-3);
  background: none;
  font-weight: 700;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s;
  margin-top: 8px;
}
.add-eval-row:hover { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }

/* ===================== ANIMATIONS ===================== */
@keyframes riseUp {
  from { opacity: 0; transform: translateY(16px) scale(.98); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}
.animate { animation: riseUp .28s cubic-bezier(.16,1,.3,1); }

/* ===================== MISC ===================== */
.error-msg { background: var(--red-bg); color: var(--red); font-size: 12px; font-weight: 700; padding: 10px 14px; border-radius: var(--r-sm); border-left: 3px solid var(--red); }
.phase-wrap { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.select-edit {
  background: var(--dark-2);
  border: 1px solid var(--dark-3);
  border-radius: var(--r-sm);
  color: white;
  padding: 8px 12px;
  width: 100%;
  outline: none;
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
      </div>
      <div class="header-title-wrap">
        <div id="header-title">読み込み中...</div>
      </div>
    </div>
    <div class="header-right">
      <button class="hbtn" id="btn-library" title="症例ライブラリ">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
      </button>
      <span id="edit-btns" style="display:none;align-items:center;gap:5px">
        <button class="hbtn-io" id="btn-io" title="データ入出力">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </button>
        <button class="hbtn-save" id="btn-save" title="クラウドに保存">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        </button>
      </span>
      <button class="btn-edit" id="btn-edit">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.07 4.93a10 10 0 0 1 1.41 14.14M4.93 4.93a10 10 0 0 0-1.41 14.14"></path></svg>
        <span id="edit-label">想定編集</span>
      </button>
    </div>
  </header>

  <!-- Sync status -->
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">ローカル保存</span>
  </div>

  <!-- Phase nav -->
  <div class="phase-nav" id="phase-nav"></div>

  <!-- Main -->
  <main>
    <section class="section" id="sec-monitor">
      <div class="scroll-area" id="monitor-area"></div>
    </section>
    <section class="section hidden" id="sec-eval">
      <div class="eval-header">
        <h2>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          活動評価表
        </h2>
        <button class="reset-btn" id="btn-reset" title="評価リセット">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.5"></path></svg>
        </button>
      </div>
      <div class="scroll-area" id="eval-area"></div>
    </section>
  </main>

  <!-- Footer nav -->
  <nav class="footer-nav">
    <button class="nav-btn active" id="nav-mon" onclick="switchTab('monitor')">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
      <span>Monitor</span>
    </button>
    <button class="nav-btn" id="nav-eval" onclick="switchTab('eval')">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
      <span>Evaluate</span>
    </button>
  </nav>

  <!-- Library Modal -->
  <div class="overlay hidden" id="modal-lib">
    <div class="modal">
      <div class="modal-header">
        <h3>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          症例ライブラリ
        </h3>
        <button class="modal-close" onclick="closeModal('modal-lib')">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body" id="lib-body"></div>
      <div style="height:env(safe-area-inset-bottom)"></div>
    </div>
  </div>

  <!-- IO Modal -->
  <div class="overlay hidden" id="modal-io">
    <div class="modal">
      <div class="modal-header">
        <h3>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          データ入出力
        </h3>
        <button class="modal-close" onclick="closeModal('modal-io')">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <p style="font-size:12px;font-weight:700;color:var(--text-3);margin-bottom:14px;line-height:1.7">
          【エクスポート】コピーボタンでテキストをコピーし、メモ帳などに保存してください。<br>
          【インポート】保存したテキストを貼り付けて「読み込む」を押すと復元できます。
        </p>
        <div style="position:relative">
          <textarea class="io-textarea" id="io-text" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
          <button class="io-copy-btn" id="btn-copy">
            <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
        </div>
        <div id="io-error" style="margin-top:10px"></div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" onclick="closeModal('modal-io')">キャンセル</button>
        <button class="btn-primary" id="btn-import">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          読み込む
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
/* ── Service Worker 登録 ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => {
        console.log('SW registered:', reg.scope);

        // 新バージョンのSWが待機中になったら更新を促す
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              if (typeof showToast === 'function') {
                showToast('アプリを更新しました。再読み込みで反映されます。');
              }
            }
          });
        });
      })
      .catch((err) => console.warn('SW registration failed:', err));
  });
}

/* ── オフライン / オンライン 検知 ── */
function updateOnlineStatus() {
  const bar = document.getElementById('sync-bar');
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!navigator.onLine) {
    if (bar) bar.style.background = '#7f1d1d';
    if (dot) { dot.style.background = '#fca5a5'; }
    if (lbl) lbl.textContent = 'オフライン（ローカル保存のみ）';
  } else {
    if (bar) bar.style.background = '';
    if (lbl && lbl.textContent.includes('オフライン')) {
      if (dot) { dot.className = 'sync-dot ok'; }
      if (lbl) lbl.textContent = 'オンライン';
    }
  }
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();
</script>
</body>
</html>
